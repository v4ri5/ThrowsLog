<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSSCode/FormStyleCSS.css">
</head>
<body>
    <form id="AthleteForm">

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="athleteEvent">Event:</label>
        <select id="athleteEvent" name="athleteEvent" required>
            <option value="">-- Select --</option>
            <option value="shot put">Shot Put</option>
            <option value="discus">Discus</option>
            <option value="hammer">Hammer</option>
            <option value="weight">Weight</option>
            <option value="javelin">Javelin</option>
            <option value="weights">Weights</option>
        </select>

        <label for="SessionType">Session Type:</label>
        <select id="SessionType" name="SessionType" required>
            <option value="">-- Select --</option>
            <option value="technique">Technique</option>
            <option value="maxeffort">Max Effort</option>
            <option value="recovery">Recovery</option>
        </select>


        <label for="Description">Description:</label>
        <textarea id="Description" name="Description" required></textarea>

        <label for="keyTakeaways">Key Takeaways:</label>
        <textarea id="keyTakeaways" name="keyTakeaways" required></textarea>

        <label for="RPE">How hard did training feel(1-10)?</label>
        <input type="number" id="RPE" name="RPE" min="1" max="10" required>

        <label for="sleep">Sleep (Hours):</label>
        <input type="number" id="sleep" name="sleep" min="0" max="24" step="0.5" required>

        <label for="PreSessionSoreness">Pre-Session Soreness (1-5):</label>
        <input type="number" id="PreSessionSoreness" name="PreSessionSoreness" min="1" max="5" required>

        <label for="AteBeforeSession">Ate Before Session:</label>
        <select id="AteBeforeSession" name="AteBeforeSession" required>
            <option value="">-- Select --</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label for="AteAfterSession">Ate After Session:</label>
        <select id="AteAfterSession" name="AteAfterSession" required>
            <option value="">-- Select --</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label for="MotivationLevel">Motivation Level (1-5):</label>
        <input type="number" id="MotivationLevel" name="MotivationLevel" min="1" max="5" required>

        <label for="injuries">Injuries:</label>
        <textarea id="injuries" name="injuries" placeholder="None"></textarea>

        <input type="submit" value="Submit">

    </form>
    <script type="module" src="js/AthleteForm.js"></script>
</body>
</html>
